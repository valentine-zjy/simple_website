researchInterests:
  - title:
      en: "LLM Training and Fine-tuning"
      zh: "大模型训练与微调"
    description:
      en: "Focused on SFT, GRPO, quantized adaptation, and capability optimization of models such as Qwen in vertical scenarios."
      zh: "关注 Qwen 等大模型在垂直场景中的 SFT、GRPO、量化适配与能力优化。"
  - title:
      en: "Dialogue Systems and Child-focused AI"
      zh: "对话系统与儿童陪伴 AI"
    description:
      en: "Improving long-memory compression, child-style expression understanding, and emotionally supportive responses for children's voice interaction scenarios."
      zh: "面向儿童语音交互场景，优化长记忆压缩、儿童化表达理解、情感陪伴回复等能力。"
  - title:
      en: "Data Production and Automated QA"
      zh: "数据生产与自动质检"
    description:
      en: "Building configurable dialogue data pipelines that connect requirement parsing, structured generation, rule validation, and automated quality checks."
      zh: "构建可配置对话数据生产系统，将需求解析、结构化生成、规则校验和自动质检串联成流水线。"
  - title:
      en: "Algorithm Engineering and Production Delivery"
      zh: "算法工程与模型落地"
    description:
      en: "Practical experience across data processing, feature engineering, training and evaluation, online platforms, and model deployment."
      zh: "具备从数据处理、特征工程、训练评估到在线平台搭建和模型部署的完整实践经验。"

experience:
  - title:
      en: "Algorithm Engineer Intern"
      zh: "算法工程师实习生"
    organization:
      en: "iFLYTEK Headquarters"
      zh: "科大讯飞总部"
    period: "2026.3 - Present"
    location:
      en: "Hefei"
      zh: "合肥"
    description:
      - en: "Participated in the training system for child voice interaction LLMs based on Qwen3-14B / Qwen3-32B, improving long-memory compression, child-style expression understanding, and emotionally supportive responses."
        zh: "参与儿童语音交互大模型训练体系建设，基于 Qwen3-14B / Qwen3-32B，围绕长记忆压缩、儿童化表达理解与情感陪伴回复等方向开展专项能力优化。"
      - en: "Built model selection and evaluation workflows to compare major domestic and international models across generation quality, task fit, data production efficiency, evaluation quality, and stability."
        zh: "搭建模型选型与评测流程，对多个国内外主流模型进行专项评估，从生成质量、任务适配性、数据生产效率、评测效果与稳定性等维度完成对比分析。"
      - en: "Built a configurable dialogue data production system for generating training samples by scenario type, persona, dialogue turns, and risk tags."
        zh: "构建可配置对话数据生产系统，支持按场景类型、角色设定、对话轮次及风险标签批量生成训练样本。"
      - en: "Connected requirement parsing, structured generation, rule validation, and automated QA into a reusable data production skill to improve consistency, controllability, and efficiency."
        zh: "通过数据生产 skill 串联需求解析、结构化生成、规则校验与自动质检流程，提升训练数据的一致性、可控性与生成效率。"
      - en: "Created long-memory compression training data that condensed multi-turn dialogue history into 20 key facts, improving key-information retention and follow-up conversation quality."
        zh: "自主构建长记忆压缩训练数据，将历史多轮对话压缩为 20 条关键信息，覆盖人物身份、性别、历史事件与对话内容，提升模型长对话关键信息保留与续聊能力。"
      - en: "Built child meme and child-style expression data to improve understanding, recognition, and correction of children's popular expressions, including safer guidance for negative memes."
        zh: "构建儿童热梗与儿童化表达训练数据，增强模型对儿童流行表达的理解、识别与纠偏能力，使模型在面对负面热梗时能够进行提醒和引导。"
      - en: "Worked on emotional enhancement for dialogue training, comparing 4B SFT, 14B SFT, and 14B SFT+GRPO, and injected expression prediction as a prefix condition into a 32B response model."
        zh: "负责对话情感增强模块的训练与优化，对比评估 4B SFT、14B SFT、14B SFT+GRPO 等方案；将表情预测结果作为前缀条件注入 32B 回复模型，形成情感预测 + 回复生成的协同推理链路。"
  - title:
      en: "PhD Assistant (Algorithms)"
      zh: "博士生助理（算法）"
    organization:
      en: "Brain-Computer Interface Lab, University of Shanghai for Science and Technology"
      zh: "上海理工大学脑机接口实验室"
    period: "2025.11 - 2026.3"
    location:
      en: "Shanghai"
      zh: "上海"
    description:
      - en: "Built and trained the CAM++ pipeline end to end, contributed to metadata standardization and data collection, and led model training and optimization."
        zh: "全链条搭建并训练 CAM++ 模型，参与元数据规范格式设计和数据采集工作，主导模型训练与优化。"
      - en: "Compared 128-dimensional MFCC with 40-dimensional reduced MFCC features and tuned key hyperparameters through grid search."
        zh: "对比 128 维 MFCC 与降维至 40 维 MFCC 数据对模型效果的影响，并通过 Grid Search 对关键超参数进行调优。"
      - en: "Transferred the best-performing soprano model to the mezzo-soprano task and improved accuracy from 45% to 60%."
        zh: "将效果最好的女高音模型迁移到女中音任务，使女中音模型准确率从 45% 提升至 60%。"
      - en: "Applied DPO to optimize the model, using model scores as rejected and teacher preference scores as chosen, and iterated with dpo_loss, pair_acc, and margin."
        zh: "采用 DPO 算法优化模型，以模型打分作为 rejected、老师偏好打分作为 chosen，持续根据 dpo_loss、pair_acc、margin 等指标优化模型。"
      - en: "Built an online scoring platform for vocal experts and improved the mezzo-soprano test-set accuracy to 92%."
        zh: "构建在线打分平台辅助声乐专家打分，将女中音模型测试集准确率进一步提升至 92%。"
      - en: "Used Claude Code together with React, TypeScript, and FastAPI to build the platform for audio upload, model scoring, result display, and local persistence."
        zh: "借助 Claude Code 等 AI 编程工具，使用 React、TypeScript、FastAPI 搭建在线打分平台，实现音频上传、模型打分、结果展示和本地持久化存储。"
  - title:
      en: "LLM Algorithm Intern"
      zh: "大模型算法实习生"
    organization:
      en: "China Unicom Group (Beijing Branch, Digitalization Department)"
      zh: "中国联通集团（北京分公司数字化部）"
    period: "2025.3 - 2025.5"
    location:
      en: "Beijing"
      zh: "北京"
    description:
      - en: "Worked on training and deployment for the Tencent King Card super membership subscription prediction model using LightGBM, including data processing, feature engineering, training, comparison, and evaluation."
        zh: "参与腾讯王卡超级会员订阅预测模型训练部署，基于 LightGBM 完成数据处理、特征工程、模型训练、效果对比与评估。"
      - en: "Constructed multi-dimensional features from user activity, spending behavior, and historical subscription records, and tuned key hyperparameters with grid search."
        zh: "针对用户活跃度、消费行为、历史订购记录等信息构建多维特征，并通过 Grid Search 对关键超参数进行调优。"
      - en: "Introduced contrastive-learning-style user representation, using users who subscribed in month T-1 as positive samples, non-subscribers as negative samples, and month T users as the test set."
        zh: "在用户表征构造中引入对比学习思想，选用 T-1 月账期办理超级会员的用户为正样本，未办理用户为负样本，T 月账期王卡用户为测试集。"
      - en: "Identified the 70%+ probability target group and improved recall from 24.6% to 57.29% and F1 from 0.3595 to 0.5003 in the comparison with the old model."
        zh: "识别概率 70%+ 目标群体，新旧模型对比中查全率从 24.6% 提升至 57.29%，F1 从 0.3595 提升至 0.5003。"

